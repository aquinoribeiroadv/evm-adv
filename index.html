<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EVM Adv">
<title>Aquino Ribeiro Advocacia</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0a1628;--navy2:#112240;--navy3:#1a3460;--gold:#c9a84c;--gold-l:#e8c97a;
  --white:#f8f6f1;--gray:#8892a4;--gray2:#4a5568;--borda:rgba(201,168,76,0.2);
  --ok:#4caf82;--erro:#e05252;--warn:#f0a500;--r:14px;--r-sm:8px;--nav-h:60px;--app-w:430px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:#050d1a;color:var(--white);height:100dvh;overflow:hidden;display:flex;justify-content:center;}
#app{position:relative;width:100%;max-width:var(--app-w);height:100dvh;overflow:hidden;background:var(--navy);box-shadow:0 0 60px rgba(0,0,0,0.6);}
.tela{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--navy);transform:translateX(100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);overflow:hidden;will-change:transform;}
.tela::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 120% 35% at 50% 0%,rgba(201,168,76,0.07) 0%,transparent 65%);pointer-events:none;z-index:0;}
.tela.ativa{transform:translateX(0)!important;}.tela.saindo{transform:translateX(-22%)!important;}
#tela-login{transform:translateX(0);}
.hdr{position:relative;z-index:10;display:flex;align-items:center;gap:10px;padding:14px 18px 12px;border-bottom:1px solid var(--borda);min-height:54px;flex-shrink:0;}
.hdr-logo{display:flex;flex-direction:column;}
.hdr-titulo{font-family:'Syne',sans-serif;font-weight:900;font-size:0.82rem;color:var(--gold);letter-spacing:-0.01em;line-height:1;}
.hdr-sub{font-size:0.57rem;color:var(--gray);letter-spacing:0.07em;text-transform:uppercase;font-weight:300;margin-top:2px;}
.hdr-flex{flex:1;}
.hdr-acoes{display:flex;gap:7px;align-items:center;}
.btn-icon{width:34px;height:34px;border-radius:50%;border:1px solid var(--borda);background:var(--navy2);color:var(--gray);font-size:0.95rem;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.btn-icon:active{opacity:0.7;}
.btn-voltar{width:32px;height:32px;border-radius:50%;border:1px solid var(--borda);background:var(--navy2);color:var(--gold);font-size:1.05rem;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.btn-voltar:active{opacity:0.7;}
.hdr-nome{font-family:'Syne',sans-serif;font-weight:800;font-size:0.92rem;color:var(--white);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative;z-index:1;padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,8px) + 8px);}
.scroll-full{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative;z-index:1;padding-bottom:calc(env(safe-area-inset-bottom,8px)+24px);}
#nav{position:absolute;bottom:0;left:0;right:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));background:rgba(10,22,40,0.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--borda);display:none;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);}
.stat-card.full{grid-column:1/-1;flex-direction:row;align-items:center;gap:14px;padding:12px 16px;}
.stat-card.full .stat-num{font-size:1.4rem;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:8px 4px;position:relative;border:none;background:none;color:var(--gray);font-family:'DM Sans',sans-serif;font-size:0.63rem;font-weight:500;letter-spacing:0.04em;transition:color 0.2s;}
.nav-tab.ativo{color:var(--gold);}
.nav-tab-icon{font-size:1.25rem;line-height:1;}
.nav-badge{position:absolute;top:5px;right:calc(50% - 20px);background:var(--erro);color:#fff;font-size:0.57rem;font-weight:800;min-width:15px;height:15px;border-radius:8px;padding:0 3px;display:flex;align-items:center;justify-content:center;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 14px 0;}
.stat-card{background:var(--navy2);border:1px solid var(--borda);border-radius:var(--r);padding:12px 11px 10px;display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:border-color 0.2s,transform 0.1s;position:relative;overflow:hidden;min-height:84px;}
.stat-card:active{transform:scale(0.97);}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0;}
.stat-card.c-urgente::after{background:var(--erro);}.stat-card.c-blue::after{background:#4a90d9;}.stat-card.c-ok::after{background:var(--ok);}.stat-card.c-gray::after{background:var(--gray2);}
.stat-icon{font-size:1rem;}
.stat-num{font-family:'Syne',sans-serif;font-weight:900;font-size:1.8rem;color:var(--white);line-height:1;}
.stat-card.c-urgente .stat-num{color:var(--erro);}.stat-card.c-blue .stat-num{color:#7eb8f7;}.stat-card.c-ok .stat-num{color:var(--ok);}
.stat-lbl{font-size:0.66rem;color:var(--gray);font-weight:500;line-height:1.3;}
.busca-wrap{padding:11px 14px 4px;position:relative;}
.busca-icon{position:absolute;left:26px;top:50%;transform:translateY(-50%);color:var(--gray);font-size:0.85rem;pointer-events:none;}
.inp-busca{width:100%;padding:10px 13px 10px 34px;background:var(--navy2);border:1.5px solid var(--borda);border-radius:24px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:0.86rem;}
.inp-busca:focus{outline:none;border-color:var(--gold);}
.inp-busca::placeholder{color:var(--gray2);}
.sec-tit{font-size:0.6rem;color:var(--gray);text-transform:uppercase;letter-spacing:0.1em;font-weight:600;padding:12px 14px 6px;}
.cli-card{margin:0 14px 9px;background:var(--navy2);border:1px solid var(--borda);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:border-color 0.15s,transform 0.1s;}
.cli-card:active{transform:scale(0.98);border-color:var(--gold);}
.cli-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.cli-nome{font-weight:700;font-size:0.86rem;color:var(--white);flex:1;line-height:1.3;text-transform:uppercase;}
.cli-chev{color:var(--gray2);font-size:0.78rem;margin-top:2px;}
.cli-info{font-size:0.71rem;color:var(--gray);margin-top:3px;line-height:1.4;}
.cli-footer{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
.cli-data{font-size:0.66rem;color:var(--gray2);}
.cliente-card{margin:0 16px 10px;background:var(--navy2);border:1px solid var(--borda);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:border-color 0.15s,transform 0.1s;}
.cliente-card:active{transform:scale(0.98);border-color:var(--gold);}
.cliente-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.cliente-nome{font-weight:700;font-size:0.9rem;color:var(--white);flex:1;line-height:1.3;}
.cliente-chevron{color:var(--gray2);font-size:0.8rem;margin-top:2px;}
.cliente-info{font-size:0.75rem;color:var(--gray);margin-top:4px;line-height:1.4;}
.cliente-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.cliente-data{font-size:0.7rem;color:var(--gray2);}
.chips-wrap{display:flex;gap:6px;padding:9px 14px 4px;overflow-x:auto;scrollbar-width:none;}
.chips-wrap::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:5px 11px;border-radius:20px;border:1.5px solid var(--borda);background:var(--navy2);color:var(--gray);font-family:'DM Sans',sans-serif;font-size:0.7rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.chip.ativo{background:var(--gold);border-color:var(--gold);color:var(--navy);}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap;}
.bg{background:rgba(201,168,76,0.18);color:var(--gold);border:1px solid rgba(201,168,76,0.3);}
.bo{background:rgba(76,175,130,0.18);color:var(--ok);border:1px solid rgba(76,175,130,0.3);}
.bb{background:rgba(74,144,217,0.18);color:#7eb8f7;border:1px solid rgba(74,144,217,0.3);}
.bz{background:rgba(136,146,164,0.15);color:var(--gray);border:1px solid rgba(136,146,164,0.2);}
.bu{background:rgba(224,82,82,0.15);color:var(--erro);border:1px solid rgba(224,82,82,0.3);}
.bp{background:rgba(160,100,220,0.15);color:#c07ef7;border:1px solid rgba(160,100,220,0.3);}
.login-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 26px;gap:26px;}
.login-logo{text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;}
.login-esc{width:66px;height:66px;background:var(--navy2);border:2px solid var(--gold);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;}
.login-tit{font-family:'Syne',sans-serif;font-weight:900;font-size:1.1rem;color:var(--gold);letter-spacing:-0.02em;text-align:center;line-height:1.2;}
.login-sub{font-size:0.66rem;color:var(--gray);letter-spacing:0.06em;text-transform:uppercase;}
.login-card{width:100%;background:var(--navy2);border:1px solid var(--borda);border-radius:var(--r);padding:20px;display:flex;flex-direction:column;gap:11px;}
.login-lbl{font-size:0.66rem;color:var(--gray);text-transform:uppercase;letter-spacing:0.08em;text-align:center;}
.inp{width:100%;padding:13px 15px;background:var(--navy);border:1.5px solid rgba(201,168,76,0.25);border-radius:var(--r-sm);color:var(--white);font-family:'DM Sans',sans-serif;font-size:1rem;letter-spacing:0.1em;text-align:center;transition:border-color 0.2s;}
.inp:focus{outline:none;border-color:var(--gold);}
.login-erro{font-size:0.73rem;color:var(--erro);text-align:center;min-height:16px;}
.btn-p{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold-l));color:var(--navy);border:none;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.2s;}
.btn-p:disabled{opacity:0.4;cursor:not-allowed;}.btn-p:active:not(:disabled){opacity:0.85;}
.btn-a{width:100%;padding:12px 15px;border-radius:var(--r-sm);border:1.5px solid;font-family:'DM Sans',sans-serif;font-size:0.86rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;transition:opacity 0.2s,transform 0.1s;text-decoration:none;background:none;}
.btn-a:active{opacity:0.8;transform:scale(0.98);}
.btn-drive{border-color:rgba(74,144,217,0.4);color:#7eb8f7;}
.btn-cont{border-color:rgba(201,168,76,0.5);color:var(--gold);}
.btn-env{border-color:rgba(76,175,130,0.35);color:var(--ok);}
.btn-sec{width:100%;padding:12px;background:var(--navy2);border:1.5px solid var(--borda);border-radius:var(--r-sm);color:var(--gray);font-family:'DM Sans',sans-serif;font-size:0.86rem;font-weight:600;cursor:pointer;transition:border-color 0.2s;}
.btn-sec:active{border-color:var(--gold);}
.ficha-hero{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,0.05);}
.ficha-pnome{font-family:'Syne',sans-serif;font-weight:900;font-size:1.4rem;color:var(--white);line-height:1;margin-bottom:5px;}
.ficha-cargo{font-size:0.83rem;font-weight:600;color:var(--gold-l);margin-bottom:2px;}
.ficha-conc{font-size:0.73rem;color:var(--gray);margin-bottom:11px;}
.tel-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;background:rgba(37,211,102,0.1);border:1.5px solid rgba(37,211,102,0.35);border-radius:24px;color:#25d366;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:700;text-decoration:none;cursor:pointer;}
.tel-btn:active{opacity:0.75;}
.ver-mais-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 14px;margin:9px 14px 0;background:var(--navy2);border:1px solid var(--borda);border-radius:var(--r-sm);color:var(--gray);font-family:'DM Sans',sans-serif;font-size:0.76rem;font-weight:600;cursor:pointer;width:calc(100% - 28px);transition:border-color 0.2s,color 0.2s;}
.ver-mais-btn:active{border-color:var(--gold);color:var(--gold);}
.vm-seta{transition:transform 0.25s;font-size:0.68rem;}.vm-seta.ab{transform:rotate(180deg);}
.vm-conteudo{overflow:hidden;max-height:0;transition:max-height 0.35s ease;}.vm-conteudo.ab{max-height:1400px;}
.info-sec{margin:9px 14px 0;background:var(--navy2);border:1px solid var(--borda);border-radius:var(--r);overflow:hidden;}
.info-row{display:flex;align-items:flex-start;padding:10px 13px;border-bottom:1px solid rgba(255,255,255,0.04);gap:9px;}
.info-row:last-child{border-bottom:none;}
.info-lbl{font-size:0.63rem;color:var(--gray);text-transform:uppercase;letter-spacing:0.05em;width:80px;flex-shrink:0;margin-top:1px;}
.info-val{font-size:0.8rem;color:var(--white);font-weight:500;flex:1;word-break:break-word;}
.et-wrap{display:flex;align-items:center;padding:13px 14px 0;}
.et-item{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;position:relative;}
.et-circ{width:28px;height:28px;border-radius:50%;border:2px solid var(--gray2);display:flex;align-items:center;justify-content:center;font-size:0.68rem;color:var(--gray);background:var(--navy);font-weight:700;position:relative;z-index:1;}
.et-circ.ok{background:var(--ok);border-color:var(--ok);color:var(--navy);}.et-circ.at{border-color:var(--gold);color:var(--gold);}
.et-lbl{font-size:0.53rem;color:var(--gray);text-align:center;}
.et-ln{flex:1;height:2px;background:var(--gray2);margin:0 -2px;margin-top:-16px;z-index:0;}.et-ln.ok{background:var(--ok);}
.doc-item{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.73rem;color:var(--gray);}
.doc-item:last-child{border-bottom:none;}
.mod-wrap{display:flex;gap:9px;padding:0 14px;}
.mod-card{flex:1;background:var(--navy2);border:2px solid var(--borda);border-radius:var(--r);padding:13px 7px;text-align:center;cursor:pointer;transition:all 0.15s;}
.mod-card:active{transform:scale(0.96);}.mod-card.sel{border-color:var(--gold);background:rgba(201,168,76,0.08);}
.mod-letra{font-family:'Syne',sans-serif;font-weight:900;font-size:1.4rem;color:var(--gold);}
.mod-desc{font-size:0.58rem;color:var(--gray);margin-top:3px;line-height:1.4;}.mod-card.sel .mod-desc{color:var(--gold-l);}
.campo-wrap{padding:0 14px;}
.campo-lbl{font-size:0.63rem;color:var(--gray);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;display:block;}
.inp-c{width:100%;padding:11px 13px;background:var(--navy);border:1.5px solid rgba(201,168,76,0.25);border-radius:var(--r-sm);color:var(--white);font-family:'DM Sans',sans-serif;font-size:0.9rem;transition:border-color 0.2s;}
.inp-c:focus{outline:none;border-color:var(--gold);}
.r2{display:flex;gap:9px;}.r2>div{flex:1;}
.res-box{margin:0 14px;background:rgba(76,175,130,0.08);border:1.5px solid rgba(76,175,130,0.35);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:9px;}
.res-tit{font-family:'Syne',sans-serif;font-weight:800;font-size:0.9rem;color:var(--ok);}
.btn-cop{padding:9px;border-radius:var(--r-sm);border:1px solid var(--ok);background:rgba(76,175,130,0.12);color:var(--ok);font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer;width:100%;}
.form-sec{margin:0 14px 12px;background:var(--navy2);border:1px solid var(--borda);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:11px;}
.form-lbl{font-size:0.63rem;color:var(--gray);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;display:block;}
.form-inp{width:100%;padding:11px 13px;background:var(--navy);border:1.5px solid rgba(201,168,76,0.2);border-radius:var(--r-sm);color:var(--white);font-family:'DM Sans',sans-serif;font-size:0.9rem;transition:border-color 0.2s;}
.form-inp:focus{outline:none;border-color:var(--gold);}
.form-inp::placeholder{color:var(--gray2);}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.25);border-top-color:currentColor;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
#toast-wrap{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:7px;pointer-events:none;width:min(90%,var(--app-w));max-width:370px;}
.toast{padding:9px 16px;border-radius:24px;font-size:0.78rem;font-weight:600;background:var(--navy2);border:1.5px solid var(--borda);color:var(--white);opacity:0;transform:translateY(-8px);transition:all 0.25s;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
.toast.vis{opacity:1;transform:translateY(0);}
.toast.t-ok{background:rgba(76,175,130,0.15);border-color:var(--ok);color:var(--ok);}
.toast.t-erro{background:rgba(224,82,82,0.15);border-color:var(--erro);color:var(--erro);}
.toast.t-gold{background:rgba(201,168,76,0.15);border-color:var(--gold);color:var(--gold);}
.empty{text-align:center;padding:38px 26px;color:var(--gray);}
.empty-ic{font-size:2rem;margin-bottom:9px;}
.empty-tx{font-size:0.8rem;line-height:1.6;}
.ld{display:flex;flex-direction:column;align-items:center;gap:9px;padding:38px 26px;color:var(--gray);font-size:0.78rem;}
.hidden{display:none!important;}
.gc{display:flex;flex-direction:column;gap:9px;}
</style>
</head>
<body>
<div id="app">
<div id="toast-wrap"></div>

<!-- LOGIN -->
<div id="tela-login" class="tela ativa">
<div class="login-wrap">
  <div class="login-logo">
    <div class="login-esc">&#9878;</div>
    <div>
      <div class="login-tit">Aquino Ribeiro<br>Advocacia</div>
      <div class="login-sub">OAB/PB 12.237</div>
    </div>
  </div>
  <div class="login-card">
    <div class="login-lbl">Acesso Restrito</div>
    <input class="inp" type="password" id="inp-senha" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" autocomplete="current-password">
    <button class="btn-p" id="btn-login" onclick="fazerLogin()">Entrar</button>
    <div class="login-erro" id="login-erro"></div>
  </div>
</div>
</div>

<!-- DASHBOARD -->
<div id="tela-dashboard" class="tela">
<div class="hdr">
  <div class="hdr-logo">
    <span class="hdr-titulo">&#9878; Aquino Ribeiro Advocacia</span>
    <span class="hdr-sub">Painel do Escritorio</span>
  </div>
  <div class="hdr-flex"></div>
  <div class="hdr-acoes">
    <button class="btn-icon" id="btn-refresh" onclick="atualizarDashboard()" title="Atualizar">&#8635;</button>
    <button class="btn-icon" onclick="irCadastro()" title="Novo cliente" style="color:var(--gold);font-size:1.1rem;">+</button>
    <button class="btn-icon" onclick="logout()" title="Sair" style="color:var(--erro);">&#9211;</button>
  </div>
</div>
<div class="scroll">
  <div class="stats-grid" id="stats-grid">
    <div class="ld" style="width:100%;"><div class="spinner" style="color:var(--gold)"></div><span>Carregando...</span></div>
  </div>
  <div class="busca-wrap">
    <span class="busca-icon">&#128269;</span>
    <input class="inp-busca" id="inp-busca-dash" type="search" placeholder="Buscar por nome ou CPF..." oninput="buscarDash(this.value)">
  </div>
  <div id="sec-recentes">
    <div class="sec-tit">Ultimos 7 dias</div>
    <div id="lista-recentes"></div>
  </div>

<script>
'use strict';

// ── STATUS DO SISTEMA ────────────────────────────────────────────
var URGENTES = [
  'Aguardando elaboração de documentos',
  'Conferência Geral',
  'Documentos complementares enviados',
  'Aguarda elaboração de Inicial',
];
var STATUS_MAP = {
  'Login Criado':                             { badge:'badge-gray', label:'Login criado' },
  'Cadastro em andamento':                    { badge:'badge-blue', label:'Cadastro em andamento' },
  'Aguardando elaboração de documentos':      { badge:'badge-gold', label:'Aguard. elaboração docs' },
  'Aguardando envio de documentos assinados': { badge:'badge-gold', label:'Aguard. docs assinados' },
  'Conferência Geral':                        { badge:'badge-erro', label:'🚨 Conferência Geral' },
  'Aguarda elaboração de Inicial':            { badge:'badge-erro', label:'🚨 Aguard. elaboração inicial' },
  'Nomeado':                                  { badge:'badge-ok',   label:'🏆 Nomeado' },
  'Processo protocolado':                     { badge:'badge-ok',   label:'Processo protocolado' },
  'Processo tramitando':                      { badge:'badge-blue', label:'Processo tramitando' },
  'Aguarda decisão':                          { badge:'badge-warn', label:'Aguarda decisão' },
  'Aguardando documentos complementares':     { badge:'badge-gold', label:'Aguard. docs complementares' },
  'Documentos complementares enviados':       { badge:'badge-erro', label:'🚨 Docs complementares enviados' },
};
function calcStatus(etapasJSON, statusTexto) {
  if (statusTexto && STATUS_MAP[statusTexto]) return statusTexto;
  var e = {};
  try { e = JSON.parse(String(etapasJSON || '{}')); } catch(_) {}
  var n = Object.values(e).filter(function(v) { return v === 'concluido'; }).length;
  if (n >= 4) return 'concluido';
  if (n === 3) return 'aguardando_contrato';
  if (n >= 1)  return 'em_andamento';
  return 'iniciado';
}
function ehUrgente(status) {
  return URGENTES.indexOf(status) >= 0 || status === 'aguardando_contrato';
}

// ── CONFIG ──────────────────────────────────────────────────────
// Depois de publicar o adv-codigo.gs como Web App, cole a URL aqui:
var GAS_URL = 'https://script.google.com/macros/s/AKfycbw1wdmKGLwUCYqwl2c7-76m_hqQHa6HHRIxTGeC43sTi0rLCTPC5QARKySa8AVV_UqKZw/exec';
var SESSAO_TTL = 8 * 60 * 60 * 1000; // 8 horas

// ── ESTADO ──────────────────────────────────────────────────────
var S = {
  senha: null,
  filtro: 'todos',
  busca: '',
  todosClientes: [],
  cpfFicha: null,
  dadosContrato: null,
  pollingId: null,
  urgAnterior: -1,
};

var navHist = [];

// ── NAVEGAÇÃO ───────────────────────────────────────────────────
function ir(telaId, initFn) {
  var atual = document.querySelector('.tela.ativa');
  if (atual) {
    if (atual.id === 'tela-login') {
      atual.classList.remove('ativa');
      navHist = [];
    } else {
      atual.classList.remove('ativa');
      atual.classList.add('saindo');
      navHist.push(atual.id);
    }
  }
  var nova = document.getElementById('tela-' + telaId);
  if (!nova) return;
  nova.classList.remove('saindo');
  nova.classList.add('ativa');
  updateNav(telaId);
  if (typeof initFn === 'function') initFn();
}

function voltar() {
  if (!navHist.length) return;
  var atual = document.querySelector('.tela.ativa');
  if (atual) atual.classList.remove('ativa');
  var prevId = navHist.pop();
  var prev = document.getElementById(prevId);
  if (prev) {
    prev.classList.remove('saindo');
    prev.classList.add('ativa');
    updateNav(prevId.replace('tela-', ''));
  }
}

function updateNav(telaId) {
  var nav = document.getElementById('bottom-nav');
  var comNav = ['dashboard', 'lista'];
  nav.style.display = comNav.indexOf(telaId) >= 0 ? 'flex' : 'none';
  // Atualizar tab ativo
  ['dashboard', 'lista', 'urgentes'].forEach(function(id) {
    var tab = document.getElementById('nav-' + id);
    if (tab) tab.classList.remove('ativo');
  });
  var ativoId = telaId === 'lista' ? 'nav-lista' : 'nav-dashboard';
  var ativoEl = document.getElementById(ativoId);
  if (ativoEl) ativoEl.classList.add('ativo');
}

function navTab(qual) {
  stopPolling();
  if (qual === 'dashboard') {
    ir('dashboard', function() { atualizarDashboard(); startPolling(); });
  } else if (qual === 'lista') {
    S.filtro = 'todos';
    resetChips();
    ir('lista', carregarLista);
  } else if (qual === 'urgentes') {
    S.filtro = 'aguardando_contrato';
    var tab = document.getElementById('nav-urgentes');
    if (tab) tab.classList.add('ativo');
    ir('lista', carregarLista);
  }
}

// ── SESSÃO ──────────────────────────────────────────────────────
function salvarSessao(senha) {
  try {
    localStorage.setItem('evm_adv_sessao', JSON.stringify({
      senha: senha,
      ts: Date.now(),
    }));
  } catch(e) {}
}

function lerSessao() {
  try {
    var raw = localStorage.getItem('evm_adv_sessao');
    if (!raw) return null;
    var obj = JSON.parse(raw);
    if (!obj || !obj.senha) return null;
    if (Date.now() - obj.ts > SESSAO_TTL) { localStorage.removeItem('evm_adv_sessao'); return null; }
    return obj.senha;
  } catch(e) { return null; }
}

function logout() {
  stopPolling();
  S.senha = null;
  navHist = [];
  try { localStorage.removeItem('evm_adv_sessao'); } catch(e) {}
  var t = document.getElementById('tela-login');
  ['tela-dashboard','tela-lista','tela-ficha','tela-contrato'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) { el.classList.remove('ativa', 'saindo'); }
  });
  t.classList.add('ativa');
  document.getElementById('inp-senha').value = '';
  document.getElementById('login-erro').textContent = '';
  document.getElementById('bottom-nav').style.display = 'none';
  updateNav('login');
}

// ── API ─────────────────────────────────────────────────────────
async function api(acao, dados) {
  if (!GAS_URL || GAS_URL.length < 30) throw new Error('GAS_URL não configurada.');
  var payload = Object.assign({ acao: acao, senha: S.senha }, dados || {});
  dbg('→ ' + acao, 'api', payload);
  var res, texto, json;
  try {
    res = await fetch(GAS_URL, { method:'POST', redirect:'follow', body: JSON.stringify(payload) });
  } catch(e) {
    dbg('fetch FALHOU', 'erro', e.message);
    throw new Error('Falha de rede: ' + e.message);
  }
  dbg('← HTTP ' + res.status + ' (' + acao + ')', res.ok ? 'net' : 'aviso');
  try { texto = await res.text(); dbg('Resposta', 'net', texto.substring(0,400)); }
  catch(e) { throw e; }
  try { json = JSON.parse(texto); }
  catch(e) { dbg('JSON inválido', 'erro', texto.substring(0,200)); throw new Error('Resposta inválida.'); }
  if (json.erro) { dbg('GAS erro', 'aviso', json); throw new Error(json.erro); }
  dbg('✔ ' + acao, 'ok', json);
  return json;
}

// ── TELA LOGIN ───────────────────────────────────────────────────
async function fazerLogin() {
  var senha = document.getElementById('inp-senha').value.trim();
  if (!senha) return;
  var btn  = document.getElementById('btn-login');
  var erro = document.getElementById('login-erro');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Entrando...';
  erro.textContent = '';
  try {
    await api('loginAdvogado', { senha: senha });
    S.senha = senha;
    salvarSessao(senha);
    ir('dashboard', function() { atualizarDashboard(); startPolling(); });
  } catch(e) {
    erro.textContent = e.message === 'Senha incorreta' ? 'Senha incorreta.' : 'Erro de conexão. Verifique o GAS_URL.';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Entrar';
  }
}

// ── TELA DASHBOARD ───────────────────────────────────────────────
async function atualizarDashboard() {
  var btn = document.getElementById('btn-refresh');
  if (btn) { btn.textContent = '⟳'; btn.style.color = 'var(--gold)'; }
  try {
    var res = await api('dashboardStats', {});
    renderStats(res.stats || {}, res.recentes || []);
  } catch(e) {
    toast('Erro ao carregar dados: ' + e.message, 'erro');
  } finally {
    if (btn) { btn.textContent = '↻'; btn.style.color = ''; }
  }
}

function renderStats(stats, recentes) {
  var urg = stats.urgentes || stats.aguardando_contrato || 0;
  if (S.urgAnterior >= 0 && urg > S.urgAnterior) {
    toast('🚨 Novo cliente urgente!', 'gold', 5000);
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  }
  S.urgAnterior = urg;

  var badge = document.getElementById('badge-urgentes');
  if (badge) { badge.textContent = urg; badge.classList.toggle('hidden', urg === 0); }

  var grid = document.getElementById('stats-grid');
  if (!grid) return;
  var cards = [
    { cls:'c-erro', icon:'🚨', num: urg,                              lbl:'Urgentes',            filtro:'urgente',             destaque: urg > 0 },
    { cls:'c-gold', icon:'⏳', num: stats.aguardando_contrato || 0,  lbl:'Aguardando contrato', filtro:'aguardando_contrato' },
    { cls:'c-blue', icon:'📝', num: stats.em_andamento || 0,         lbl:'Em andamento',        filtro:'em_andamento' },
    { cls:'c-ok',   icon:'✅', num: stats.concluido || 0,            lbl:'Concluídos',          filtro:'concluido' },
    { cls:'c-gray', icon:'👤', num: stats.total || 0,                lbl:'Total de clientes',   filtro:'todos', full: true },
  ];
  grid.innerHTML = cards.map(function(cd) {
    return '<div class="stat-card ' + cd.cls + (cd.destaque ? ' destaque' : '') + (cd.full ? ' full' : '') + '" onclick="irLista(\'' + cd.filtro + '\')">' +
      '<span class="stat-icon">' + cd.icon + '</span>' +
      '<span class="stat-num">' + cd.num + '</span>' +
      '<span class="stat-lbl">' + cd.lbl + '</span>' +
    '</div>';
  }).join('');

  var el = document.getElementById('lista-recentes');
  if (!el) return;
  if (!recentes.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-txt">Nenhum cliente nos últimos 7 dias.</div></div>';
    return;
  }
  el.innerHTML = '<div style="padding-top:4px;">' + recentes.map(function(cl) { return clienteCardHtml(cl); }).join('') + '</div>';
}

function buscarDash(val) {
  S.busca = val.trim();
  if (!S.busca) {
    document.getElementById('secao-recentes').style.display = '';
    return;
  }
  document.getElementById('secao-recentes').style.display = 'none';
  S.filtro = 'todos';
  ir('lista', carregarLista);
}

function irLista(filtro) {
  S.filtro = filtro || 'todos';
  resetChips();
  ir('lista', carregarLista);
}

// ── TELA LISTA ───────────────────────────────────────────────────
async function carregarLista() {
  var wrap = document.getElementById('lista-clientes-wrap');
  var titulo = document.getElementById('lista-titulo');
  if (titulo) titulo.textContent = labelFiltro(S.filtro);

  if (wrap) wrap.innerHTML = '<div class="loading-state"><div class="spinner" style="color:var(--gold)"></div><span>Carregando...</span></div>';

  // Limpar busca anterior da dash
  var inpLista = document.getElementById('inp-busca-lista');
  if (inpLista) {
    if (S.busca && document.getElementById('inp-busca-dash') && document.getElementById('inp-busca-dash').value) {
      inpLista.value = S.busca;
    }
  }

  try {
    var res = await api('listarClientes', { filtro: S.filtro, busca: S.busca });
    S.todosClientes = res.clientes || [];
    S.busca = '';
    if (document.getElementById('inp-busca-dash')) document.getElementById('inp-busca-dash').value = '';
    renderLista(S.todosClientes);
  } catch(e) {
    if (wrap) wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-txt">' + e.message + '</div></div>';
  }
}

function filtrarLista() {
  var busca = document.getElementById('inp-busca-lista').value.trim().toLowerCase();
  var buscaNum = busca.replace(/\D/g, '');
  var filtrados = S.todosClientes.filter(function(c) {
    if (!busca) return true;
    var nomeOk = c.nome.toLowerCase().indexOf(busca) >= 0;
    var cpfOk  = buscaNum && c.cpf.replace(/\D/g,'').indexOf(buscaNum) >= 0;
    return nomeOk || cpfOk;
  });
  renderLista(filtrados);
}

function renderLista(clientes) {
  var wrap  = document.getElementById('lista-clientes-wrap');
  var count = document.getElementById('lista-count');
  if (count) count.textContent = clientes.length + ' cliente' + (clientes.length !== 1 ? 's' : '');
  if (!wrap) return;
  if (!clientes.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-txt">Nenhum cliente encontrado.</div></div>';
    return;
  }
  wrap.innerHTML = '<div style="padding-top:8px;">' + clientes.map(function(c) { return clienteCardHtml(c); }).join('') + '</div>';
}

function setFiltro(filtro, el) {
  S.filtro = filtro;
  document.querySelectorAll('#chips-filtro .chip').forEach(function(ch) { ch.classList.remove('ativo'); });
  if (el) el.classList.add('ativo');
  if (S.todosClientes.length) {
    var filtrados;
    if (filtro === 'todos') {
      filtrados = S.todosClientes;
    } else if (filtro === 'urgente') {
      filtrados = S.todosClientes.filter(function(cl) { return ehUrgente(cl.status); });
    } else {
      filtrados = S.todosClientes.filter(function(cl) { return cl.status === filtro; });
    }
    renderLista(filtrados);
  } else {
    carregarLista();
  }
}

function resetChips() {
  document.querySelectorAll('#chips-filtro .chip').forEach(function(c, i) {
    c.classList.toggle('ativo', i === 0);
  });
}

function clienteCardHtml(c) {
  var cargo = c.cargo || '';
  var conc  = c.concurso || '';
  var info  = [cargo, conc].filter(Boolean).join(' <span class="cliente-dot">·</span> ');
  return '<div class="cliente-card" onclick="abrirFicha(\'' + escapar(c.cpf) + '\')">' +
    '<div class="cliente-card-top">' +
      '<span class="cliente-nome">' + escapar(c.nome || 'Sem nome') + '</span>' +
      '<span class="cliente-chevron">›</span>' +
    '</div>' +
    '<div class="cliente-info">' + info + '</div>' +
    '<div class="cliente-footer">' +
      badgeHtml(c.status) +
      '<span class="cliente-data">' + (c.dataCadastro || '') + '</span>' +
    '</div>' +
  '</div>';
}

// ── TELA FICHA ───────────────────────────────────────────────────
function abrirFicha(cpf) {
  S.cpfFicha = cpf;
  ir('ficha', carregarFicha);
}

async function carregarFicha() {
  var wrap = document.getElementById('ficha-conteudo');
  var hdr  = document.getElementById('ficha-nome-hdr');
  if (wrap) wrap.innerHTML = '<div class="loading-state"><div class="spinner" style="color:var(--gold)"></div><span>Carregando ficha...</span></div>';
  try {
    var res = await api('buscarCliente', { cpf: S.cpfFicha });
    var c   = res.cliente;
    if (hdr) hdr.textContent = (c.nome || 'Cliente').split(' ')[0];
    renderFicha(c, wrap);
  } catch(e) {
    if (wrap) wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-txt">' + e.message + '</div></div>';
  }
}

function renderFicha(c, wrap) {
  if (!wrap) return;
  var etapas     = c.etapas || {};
  var nEtapas    = Object.values(etapas).filter(function(v) { return v === 'concluido'; }).length;
  var aguardaContr = nEtapas === 3;
  var temDrive     = !!c.linkPasta;
  var telNum       = (c.telefone || '').replace(/\D/g,'');
  var telWpp       = telNum ? 'https://wa.me/55' + telNum : '';
  var primeiroNome = (c.nome || '').split(' ')[0];

  // Etapas visual
  var etapasHtml = '';
  for (var i = 1; i <= 4; i++) {
    var ok = etapas[String(i)] === 'concluido';
    var atual = !ok && (etapas[String(i-1)] === 'concluido' || i === 1);
    etapasHtml += '<div class="etapa-item">' +
      '<div class="etapa-circulo' + (ok ? ' concluida' : atual ? ' atual' : '') + '">' + (ok ? '✓' : i) + '</div>' +
      '<div class="etapa-lbl">Etapa ' + i + '</div>' +
    '</div>';
    if (i < 4) {
      etapasHtml += '<div class="etapa-linha' + (ok ? ' ok' : '') + '"></div>';
    }
  }

  // Docs na pasta
  var docs = c.docs || [];
  var docsHtml = docs.length
    ? docs.map(function(d) {
        return '<div class="doc-item"><span class="doc-check">📄</span><span>' + escapar(d) + '</span></div>';
      }).join('')
    : '<div class="doc-item" style="color:var(--gray2)">Nenhum documento encontrado na pasta.</div>';

  var telNum = (c.telefone || '').replace(/\D/g,'');
  var telWpp = telNum ? 'https://wa.me/55' + telNum : '';
  var primeiroNome = (c.nome || '').split(' ')[0];

  wrap.innerHTML =
    '<div class="ficha-topo">' +
      '<div class="ficha-primeiro-nome">' + escapar(primeiroNome || 'Cliente') + '</div>' +
      '<div class="ficha-cargo">' + escapar(c.cargo || 'Cargo não informado') + '</div>' +
      '<div class="ficha-concurso-nome">📍 ' + escapar(c.concurso || 'Concurso não informado') + '</div>' +
      (telWpp ? '<a class="ficha-tel-btn" href="' + telWpp + '" target="_blank" rel="noopener">💬 ' + escapar(c.telefone || '') + '</a>' : '') +
    '</div>' +
    '<div style="padding:12px 16px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' +
      badgeHtml(c.status) +
      '<span style="font-size:0.72rem;color:var(--gray);">CPF: ' + fmtCPF(c.cpf) + '</span>' +
    '</div>' +

    // Etapas
    '<div class="etapas-visual">' + etapasHtml + '</div>' +

    // Card concurso
    '<div class="ficha-concurso">' +
      '<div class="ficha-cargo">' + escapar(c.cargo || 'Cargo não informado') + '</div>' +
      '<div class="ficha-concurso-nome">📍 ' + escapar(c.concurso || 'Concurso não informado') + '</div>' +
      '<div class="ficha-detalhes">' +
        fichaDetalhe('Classificação', c.classificacao ? c.classificacao + 'º lugar' : '—') +
        fichaDetalhe('Salário', c.salario || '—') +
        fichaDetalhe('Pediu JG', c.pedirJG || '—') +
      '</div>' +
    '</div>' +

    // Dados pessoais
    '<div class="info-section">' +
      infoRow('Email', c.email) +
      infoRow('Telefone', c.telefone) +
      infoRow('Endereço', [c.rua, c.numero, c.bairro, c.cidade, c.uf].filter(Boolean).join(', ') || '—') +
      infoRow('Cadastro', c.dataCadastro || '—') +
      (c.dataConclusao ? infoRow('Conclusão', c.dataConclusao) : '') +
    '</div>' +

    // Ações
    '<div class="ficha-acoes">' +
      (temDrive ? '<a class="btn-acao btn-drive" href="' + c.linkPasta + '" target="_blank" rel="noopener">📁 Abrir pasta do Cliente</a>' : '') +
      (aguardaContr ? '<button class="btn-acao btn-contrato" onclick="abrirContrato()">📝 Gerar Contrato</button>' : '') +
      (nEtapas >= 3 ? '<button class="btn-acao btn-enviar-docs" onclick="enviarDocs(\'' + escapar(c.cpf) + '\')">📧 Enviar Documentos</button>' : '') +
    '</div>' +
    '<button class="ver-mais-btn" id="btn-ver-mais-vm1" onclick="toggleVerMais(\'vm1\')">▼ Ver mais informações</button>' +
    '<div class="ver-mais-conteudo" id="vm1">' +
      '<div class="info-section">' +
        infoRow('Email', c.email) +
        infoRow('Classificação', c.classificacao ? c.classificacao + 'º lugar' : '—') +
        infoRow('Salário Edital', c.salario || '—') +
        infoRow('Pediu JG', c.pedirJG || '—') +
        infoRow('Anos IR', c.anosIR || '—') +
        infoRow('Endereço', [c.rua, c.numero, c.bairro, c.cidade, c.uf].filter(Boolean).join(', ') || '—') +
        infoRow('Cadastro', c.dataCadastro || '—') +
        (c.dataConclusao ? infoRow('Conclusão', c.dataConclusao) : '') +
      '</div>' +
      '<div class="secao-titulo">Documentos na pasta</div>' +
      '<div class="docs-lista" style="margin:0 16px;">' + docsHtml + '</div>' +
    '</div>';

  // Guardar dados para tela de contrato
  S.dadosContrato = c;
}

function fichaDetalhe(lbl, val) {
  return '<div class="ficha-detalhe-item"><span class="ficha-detalhe-lbl">' + lbl + '</span><span class="ficha-detalhe-val">' + escapar(String(val || '—')) + '</span></div>';
}
function infoRow(lbl, val) {
  return '<div class="info-row"><span class="info-lbl">' + lbl + '</span><span class="info-val">' + escapar(String(val || '—')) + '</span></div>';
}

async function enviarDocs(cpf) {

function modeloCard(id, letra, desc, ativo) {

var modeloAtivo = 'A';

function selecionarModelo(m) {
  modeloAtivo = m;
  ['A','B','C'].forEach(function(id) {
    var el = document.getElementById('modelo-' + id);
    if (el) el.classList.toggle('selecionado', id === m);
  });
  renderCamposContrato(m);
}

function renderCamposContrato(m) {
  var wrap = document.getElementById('campos-contrato');
  if (!wrap) return;
  var html = '';
  if (m === 'A') {
    html =
      '<div class="campo-wrap"><label class="campo-lbl">Nº de parcelas no sucesso</label>' +
      '<input class="inp-campo" type="number" id="c-nparcelas" min="1" max="24" value="6" placeholder="Ex: 6"></div>' +
      '<div class="campo-wrap"><label class="campo-lbl">Valor de cada parcela</label>' +
      '<input class="inp-campo" type="text" id="c-vparcela" placeholder="R$ 0,00" oninput="mascaraMoeda(this)"></div>';
  } else if (m === 'B') {
    html =
      '<div class="campo-wrap"><label class="campo-lbl">Valor do pagamento único</label>' +
      '<input class="inp-campo" type="text" id="c-ventrada" placeholder="R$ 0,00" oninput="mascaraMoeda(this)"></div>';
  } else {
    html =
      '<div class="campo-wrap"><label class="campo-lbl">Valor da entrada (no ato)</label>' +
      '<input class="inp-campo" type="text" id="c-ventrada" placeholder="R$ 0,00" oninput="mascaraMoeda(this)"></div>' +
      '<div class="row2-campos campo-wrap">' +
        '<div><label class="campo-lbl">Nº de parcelas</label>' +
        '<input class="inp-campo" type="number" id="c-nparcelas" min="1" max="24" value="6" placeholder="6"></div>' +
        '<div><label class="campo-lbl">Valor da parcela</label>' +
        '<input class="inp-campo" type="text" id="c-vparcela" placeholder="R$ 0,00" oninput="mascaraMoeda(this)"></div>' +
      '</div>';
  }
  wrap.innerHTML = html;
  // Aplicar valor padrão R$ 500,00
  setTimeout(function() {
    var vp = document.getElementById('c-vparcela');
    if (vp && !vp.value) { vp.value = 'R$ 500,00'; }
  }, 50);
}

async function gerarContrato() {
  var c = S.dadosContrato;
  if (!c) { toast('Dados do cliente não encontrados.', 'erro'); return; }

  var ventrada  = valNum('c-ventrada');
  var nparcelas = valInt('c-nparcelas');
  var vparcela  = valNum('c-vparcela');

  // Validação por modelo
  if (modeloAtivo === 'A') {
    if (!vparcela || !nparcelas) { toast('Informe o número e valor das parcelas.', 'erro'); return; }
  } else if (modeloAtivo === 'B') {
    if (!ventrada) { toast('Informe o valor do pagamento único.', 'erro'); return; }
  } else {
    if (!ventrada || !vparcela || !nparcelas) { toast('Preencha todos os campos.', 'erro'); return; }
  }

  var btn     = document.getElementById('btn-gerar-contrato');
  var loading = document.getElementById('gerar-loading');
  var result  = document.getElementById('resultado-contrato');

  btn.classList.add('hidden');
  loading.classList.remove('hidden');
  result.classList.add('hidden');

  try {
    var res = await api('gerarContrato', {
      cpf:          c.cpf,
      modelo:       modeloAtivo,
      valorEntrada: ventrada.toFixed(2),
      valorParcela: vparcela.toFixed(2),
      nParcelas:    String(nparcelas),
    });

    loading.classList.add('hidden');
    if (res.erro) {
      toast('Erro: ' + res.erro, 'erro');
      btn.classList.remove('hidden');
      return;
    }

    result.className = 'resultado-box';
    result.innerHTML =
      '<div class="resultado-titulo">✅ Contrato gerado!</div>' +
      '<div class="resultado-link">Revise na pasta do Drive antes de enviar.</div>' +
      '<button class="btn-primario" onclick="voltar()" style="margin-top:4px;">Voltar para a ficha</button>';
    var btnEnv = document.getElementById('btn-enviar-contrato');
    if (btnEnv) btnEnv.classList.remove('hidden');
    toast('Contrato gerado com sucesso!', 'ok');
  } catch(e) {
    loading.classList.add('hidden');
    btn.classList.remove('hidden');
    toast('Erro ao gerar contrato: ' + e.message, 'erro');
  }
}

function copiarLink(link) {
  navigator.clipboard.writeText(link).then(function() {
    toast('Link copiado!', 'ok');
  }).catch(function() {
    toast('Não foi possível copiar.', 'erro');
  });
}

async function enviarDocsContrato() {
  var c = S.dadosContrato;
  if (!c) return;
  var btn = document.getElementById('btn-enviar-contrato');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Enviando...'; }
  try {
    await api('enviarDocs', { cpf: c.cpf });
    toast('✅ Documentos enviados com sucesso!', 'ok');
    if (btn) { btn.disabled = false; btn.innerHTML = '📧 Enviar Documentos ao Cliente'; }
  } catch(e) {
    toast('Erro ao enviar: ' + e.message, 'erro');
    if (btn) { btn.disabled = false; btn.innerHTML = '📧 Enviar Documentos ao Cliente'; }
  }
}

function irCadastro() {
  ir('cadastro', function() {
    document.getElementById('cad-nome').value = '';
    document.getElementById('cad-cargo').value = '';
    document.getElementById('cad-concurso').value = '';
    document.getElementById('cad-tel').value = '';

    document.getElementById('cad-msg').textContent = '';
  });
}
function fmtTelCad(inp) {
  var v = inp.value.replace(/\D/g,'').substring(0,11);
  if (v.length > 6) v = v.replace(/(\d{2})(\d{5})(\d{0,4})/,'($1) $2-$3');
  else if (v.length > 2) v = v.replace(/(\d{2})(\d{0,5})/,'($1) $2');
  else if (v.length > 0) v = v.replace(/(\d{0,2})/,'($1');
  inp.value = v;
}
function verificarCadastro() {
  var nome  = document.getElementById('cad-nome').value.trim();
  var cargo = document.getElementById('cad-cargo').value.trim();
  var conc  = document.getElementById('cad-concurso').value.trim();
  var tel   = document.getElementById('cad-tel').value.replace(/\D/g,'');
  document.getElementById('btn-salvar-cadastro').disabled = !(nome.length >= 3 && cargo.length >= 2 && conc.length >= 2 && tel.length >= 10);
}

function toggleVerMais(id) {

  var btn = document.getElementById('btn-ver-mais-' + id);

// ── POLLING ──────────────────────────────────────────────────────
function startPolling() {
  stopPolling();
  S.pollingId = setInterval(function() {
    api('dashboardStats', {}).then(function(res) {
      var urg = (res.stats || {}).aguardando_contrato || 0;
      var badge = document.getElementById('badge-urgentes');
      if (badge) {
        badge.textContent = urg;
        badge.classList.toggle('hidden', urg === 0);
      }
      if (S.urgAnterior >= 0 && urg > S.urgAnterior) {
        toast('⏳ Novo cliente aguardando contrato!', 'gold', 5000);
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        renderStats(res.stats || {}, res.recentes || []);
      }
      S.urgAnterior = urg;
    }).catch(function() {});
  }, 30000);
}

function stopPolling() {
  if (S.pollingId) { clearInterval(S.pollingId); S.pollingId = null; }
}

// ── UTILS ────────────────────────────────────────────────────────
function fmtCPF(cpf) {
  var n = String(cpf || '').replace(/\D/g,'').padStart(11,'0');
  return n.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
}

function labelFiltro(f) {
  var m = { todos: 'Todos os Clientes', aguardando_contrato: 'Aguardando Contrato', em_andamento: 'Em Andamento', concluido: 'Concluídos', iniciado: 'Iniciados' };
  return m[f] || 'Clientes';
}

function badgeHtml(status) {
  var built = {
    aguardando_contrato: ['badge-gold', '⏳ Aguard. contrato'],
    em_andamento:        ['badge-blue', '📝 Em andamento'],
    concluido:           ['badge-ok',   '✅ Concluído'],
    iniciado:            ['badge-gray', '👤 Iniciado'],
    urgente:             ['badge-erro', '🚨 Urgente'],
  };
  if (built[status]) {
    var v = built[status];
    return '<span class="badge ' + v[0] + '">' + v[1] + '</span>';
  }
  // Status textual do sistema
  var sm = STATUS_MAP[status];
  if (sm) return '<span class="badge ' + sm.badge + '">' + sm.label + '</span>';
  return '<span class="badge badge-gray">' + (status || '—') + '</span>';
}

function mascaraMoeda(el) {
  var raw = el.value.replace(/\D/g,'');
  if (!raw) { el.value = ''; return; }
  var n = parseInt(raw, 10) / 100;
  el.value = 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function valNum(id) {
  var el = document.getElementById(id);
  if (!el) return 0;
  var v = el.value.replace(/[^0-9,]/g,'').replace(',','.');
  return parseFloat(v) || 0;
}

function valInt(id) {
  var el = document.getElementById(id);
  if (!el) return 0;
  return parseInt(el.value, 10) || 0;
}

function escapar(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, tipo, dur) {
  var wrap = document.getElementById('toast-wrap');
  var el   = document.createElement('div');
  el.className = 'toast-item' + (tipo ? ' t-' + tipo : '');
  el.textContent = msg;
  wrap.appendChild(el);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { el.classList.add('visivel'); });
  });
  setTimeout(function() {
    el.classList.remove('visivel');
    setTimeout(function() { el.remove(); }, 300);
  }, dur || 3000);
}

(function init() {
  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  }
  // Checar sessão salva
  var senha = lerSessao();
  if (senha) {
    S.senha = senha;
    ir('dashboard', function() { atualizarDashboard(); startPolling(); });
  }
  // Enter no campo de senha
  var inp = document.getElementById('inp-senha');
  if (inp) inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') fazerLogin();
  });
  // Visibilidade — retomar polling ao voltar para o app
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible' && S.senha) {
      var dash = document.getElementById('tela-dashboard');
      if (dash && dash.classList.contains('ativa')) {
        atualizarDashboard();
        startPolling();
      }
    } else {
      stopPolling();
    }
  });
})();

var _dbgN = 0;

  var cor = cores[tipo] || '#8892a4';
  var ts  = new Date().toLocaleTimeString('pt-BR');
  var extra = '';
  if (dados !== undefined) {
    try { extra = '<div style="color:#4a6a5a;font-size:0.58rem;padding-left:8px;margin-top:2px;white-space:pre-wrap;word-break:break-all;">' + JSON.stringify(dados,null,2).substring(0,600) + '</div>'; }
    catch(e) { extra = '<div style="color:#4a5568;font-size:0.58rem;">' + String(dados).substring(0,300) + '</div>'; }
  }
  box.innerHTML = '<div style="border-bottom:1px solid rgba(255,255,255,0.04);padding:4px 0;"><span style="color:#2a4a6a;font-size:0.58rem;">[' + ts + ']</span> <span style="color:' + cor + ';font-size:0.65rem;">' + String(msg) + '</span>' + extra + '</div>' + box.innerHTML;
  if (tit) tit.textContent = 'DEBUG EVM-Adv [' + _dbgN + ']';

}
async function dbgPing() {
  dbg('Ping...', 'api');
  try {
    var r = await fetch(GAS_URL, { method:'POST', redirect:'follow', body: JSON.stringify({ acao:'ping' }) });
    var t = await r.text();
    dbg('Ping HTTP ' + r.status, r.ok ? 'ok' : 'erro', t.substring(0,200));
  } catch(e) { dbg('Ping FALHOU', 'erro', e.message); }
}
function dbgEstado() {
  dbg('Estado', 'info', { GAS_URL: GAS_URL, senha_ok: !!S.senha, filtro: S.filtro });
}

// ── INIT ─────────────────────────────────────────────────────────
(function init() {
  dbg('EVM Adv v3 iniciando...', 'info');
  dbg('GAS_URL', 'info', GAS_URL);
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(function(reg) {
      reg.update(); dbg('SW registrado', 'ok');
    }).catch(function(e) { dbg('SW erro', 'aviso', e.message); });
  }
  var senha = lerSessao();
  if (senha) {
    S.senha = senha;
    ir('dashboard', function() { atualizarDashboard(); startPolling(); });
  }
  var inp = document.getElementById('inp-senha');
  if (inp) inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') fazerLogin(); });
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible' && S.senha) {
      var dash = document.getElementById('tela-dashboard');
      if (dash && dash.classList.contains('ativa')) { atualizarDashboard(); startPolling(); }
    } else { stopPolling(); }
  });
})();
// EVM Adv — v3
</script>
